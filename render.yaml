services:
  - type: web
    name: metodologia-5s
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./db/custom.db
    disk:
      name: data
      mountPath: /opt/render/project/src
      sizeGB: 1
