<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Limpiando caché...</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f0fdf4; color: #166534; }
    .container { text-align: center; padding: 2rem; }
    .spinner { border: 4px solid #e5e7eb; border-top: 4px solid #22c55e; border-radius: 50%; width: 48px; height: 48px; animation: spin 1s linear infinite; margin: 0 auto 1.5rem; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #6b7280; font-size: 0.9rem; }
    .status { margin-top: 1rem; font-size: 0.8rem; color: #9ca3af; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <h1>Limpiando caché...</h1>
    <p>Eliminando datos antiguos para cargar la última versión</p>
    <div class="status" id="status">Iniciando...</div>
  </div>
  <script>
    (async function() {
      const status = document.getElementById('status');
      
      try {
        // Step 1: Unregister ALL service workers
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          status.textContent = `Eliminando ${regs.length} service worker(s)...`;
          for (const reg of regs) {
            await reg.unregister();
          }
          status.textContent = 'Service workers eliminados ✓';
        }

        // Step 2: Clear ALL caches
        if ('caches' in window) {
          const names = await caches.keys();
          status.textContent = `Eliminando ${names.length} caché(s)...`;
          for (const name of names) {
            await caches.delete(name);
          }
          status.textContent = 'Cachés eliminados ✓';
        }

        // Step 3: Clear localStorage and sessionStorage
        try { localStorage.clear(); } catch(e) {}
        try { sessionStorage.clear(); } catch(e) {}

        // Step 4: Wait a moment, then redirect with cache-bust
        status.textContent = 'Redirigiendo a la app actualizada...';
        await new Promise(r => setTimeout(r, 1000));
        
        // Use replace to avoid back button going to this page
        window.location.replace('/?_fresh=' + Date.now());
      } catch (err) {
        status.textContent = 'Error: ' + err.message;
        // Still try to redirect after a delay
        setTimeout(function() {
          window.location.replace('/?_fresh=' + Date.now());
        }, 3000);
      }
    })();
  </script>
</body>
</html>
