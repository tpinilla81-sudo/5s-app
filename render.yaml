services:
  - type: web
    name: 5s-methodology-app
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: bash start-railway.sh
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./db/custom.db
      - key: PORT
        value: 3000
